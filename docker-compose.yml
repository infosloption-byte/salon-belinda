services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_SHOP_URL=${VITE_SHOP_URL:-https://shop.belinda.ycusriya.online}
    container_name: belinda_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9030:80"

  shop:
    build:
      context: ./shop
      args:
        - VITE_MAIN_SITE_URL=${VITE_MAIN_SITE_URL:-https://belinda.ycusriya.online}
        - VITE_API_URL=${VITE_API_URL:-https://belinda.ycusriya.online/api}
    container_name: belinda_shop
    restart: unless-stopped
    ports:
      - "127.0.0.1:9031:80"

  backend:
    build:
      context: ./backend
    container_name: belinda_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9032:8080"
    command: php artisan serve --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_NAME=Salon Belinda
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY:-}
      - APP_URL=${APP_URL:-https://belinda.ycusriya.online}
      - APP_TIMEZONE=Asia/Colombo
      - DB_CONNECTION=mysql
      - DB_HOST=mysql_shared
      - DB_PORT=3306
      - DB_DATABASE=salon_belinda
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=sync
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://belinda.ycusriya.online,https://shop.belinda.ycusriya.online}
      - MAIL_MAILER=log
      - MAIL_FROM_ADDRESS=info.salonbelinda@gmail.com
      - MAIL_FROM_NAME=Salon Belinda
      - PAYMENT_GATEWAY_KEY=${PAYMENT_GATEWAY_KEY:-}
      - PAYMENT_GATEWAY_SECRET=${PAYMENT_GATEWAY_SECRET:-}
    networks:
      - shared_net

networks:
  shared_net:
    external: true
