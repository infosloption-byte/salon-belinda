services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_SHOP_URL=${VITE_SHOP_URL:-https://shop.yoursalon.example.com}
        - VITE_API_URL=${VITE_API_URL:-https://api.yoursalon.example.com/api}
        - VITE_SALON_NAME=${SALON_NAME:-Your Salon}
        - VITE_SALON_OWNER_NAME=${SALON_OWNER_NAME:-Salon Owner}
        - VITE_SALON_OWNER_FIRST_NAME=${SALON_OWNER_FIRST_NAME:-Owner}
        - VITE_SALON_OWNER_TITLE=${SALON_OWNER_TITLE:-Founder & Lead Stylist}
        - VITE_SALON_OWNER_QUOTE=${SALON_OWNER_QUOTE:-Every client should leave feeling like the most confident version of themselves.}
        - VITE_SALON_ADDRESS=${SALON_ADDRESS:-123 Main Street, Your City}
        - VITE_SALON_EMAIL=${SALON_EMAIL:-info@yoursalon.com}
        - VITE_SALON_PHONE=${SALON_PHONE:-000 000 0000}
        - VITE_SALON_PHONE_HREF=${SALON_PHONE_HREF:-tel:+10000000000}
        - VITE_SALON_FACEBOOK_URL=${SALON_FACEBOOK_URL:-https://facebook.com}
        - VITE_SALON_INSTAGRAM_URL=${SALON_INSTAGRAM_URL:-https://instagram.com}
    container_name: salon_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9030:80"

  shop:
    build:
      context: ./shop
      args:
        - VITE_MAIN_SITE_URL=${VITE_MAIN_SITE_URL:-https://yoursalon.example.com}
        - VITE_API_URL=${VITE_API_URL:-https://api.yoursalon.example.com/api}
        - VITE_SALON_NAME=${SALON_NAME:-Your Salon}
        - VITE_SHOP_TAGLINE=${SHOP_TAGLINE:-Salon & Beauty — Shop}
        - VITE_SALON_ADDRESS=${SALON_ADDRESS:-123 Main Street, Your City}
        - VITE_SALON_EMAIL=${SALON_EMAIL:-info@yoursalon.com}
        - VITE_SALON_PHONE=${SALON_PHONE:-000 000 0000}
        - VITE_SALON_PHONE_HREF=${SALON_PHONE_HREF:-tel:+10000000000}
        - VITE_SALON_FACEBOOK_URL=${SALON_FACEBOOK_URL:-https://facebook.com}
        - VITE_SALON_INSTAGRAM_URL=${SALON_INSTAGRAM_URL:-https://instagram.com}
        - VITE_SHOP_CURRENCY=${SHOP_CURRENCY:-USD}
        - VITE_SHOP_DELIVERY_FEE=${SHOP_DELIVERY_FEE:-0}
        - VITE_SHOP_FREE_DELIVERY_THRESHOLD=${SHOP_FREE_DELIVERY_THRESHOLD:-0}
        - VITE_SHOP_PICKUP_AVAILABLE=${SHOP_PICKUP_AVAILABLE:-true}
    container_name: salon_shop
    restart: unless-stopped
    ports:
      - "127.0.0.1:9031:80"

  admin:
    build:
      context: ./admin
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.yoursalon.example.com/api}
        - VITE_SALON_NAME=${SALON_NAME:-Your Salon}
        - VITE_SALON_ADDRESS=${SALON_ADDRESS:-123 Main Street, Your City}
    container_name: salon_admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:9033:80"

  backend:
    build:
      context: ./backend
    container_name: salon_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9032:8080"
    command: php artisan serve --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_NAME=${APP_NAME:-Salon SaaS}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-https://api.yoursalon.example.com}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql_shared
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-salon_saas}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=sync
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://yoursalon.example.com,https://shop.yoursalon.example.com,https://admin.yoursalon.example.com}
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-info@yoursalon.example.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_SCHEME=${MAIL_SCHEME:-}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-info@yoursalon.example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Salon SaaS}
      - SALON_NOTIFY_EMAIL=${SALON_NOTIFY_EMAIL:-info@yoursalon.example.com}
      - SALON_PHONE=${SALON_PHONE:-000 000 0000}
      - SALON_ADDRESS=${SALON_ADDRESS:-123 Main Street, Your City}
      - PAYMENT_GATEWAY_KEY=${PAYMENT_GATEWAY_KEY:-}
      - PAYMENT_GATEWAY_SECRET=${PAYMENT_GATEWAY_SECRET:-}
    networks:
      - shared_net

networks:
  shared_net:
    external: true